# ── Volo internal DNS resolver ────────────────────────────────────────────────
#
# Resolves .internal service hostnames privately and forwards everything else
# to public DNS. Run as a container inside volo-net (see docker-compose.prod.yml).
#
# To move a service to its own droplet:
#   1. Update the address= line below to the new droplet's private IP.
#   2. docker compose restart dns
#   3. Remove the service block from docker-compose.prod.yml.
#   Nothing else changes.
# ──────────────────────────────────────────────────────────────────────────────

# Don't inherit the host's resolv.conf or /etc/hosts
no-resolv
no-hosts

# Public DNS upstream (Cloudflare primary, Google fallback)
server=1.1.1.1
server=8.8.8.8

# Never forward .internal queries upstream — they are private by definition
local=/internal/

# ── Internal service records ───────────────────────────────────────────────
# Current value: fixed IP of the container within volo-net.
# When a service moves out: replace with the new droplet's private IP.

# Current app droplet private IP: 10.108.0.2
# While postgres/redis run on this droplet these point to their container IPs
# within volo-net. When a service moves to its own droplet, replace the
# corresponding IP with that droplet's private IP and restart volo-dns.
address=/volo-db.internal/172.20.0.10
address=/volo-cache.internal/172.20.0.11
