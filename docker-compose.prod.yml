# ── Volo Production Deployment ──────────────────────────────
# docker-compose.prod.yml
#
# Uses system nginx as reverse proxy (shared with trading bot)
# Deploy: docker compose -f docker-compose.prod.yml up -d --build
# Domain: volo.kingpinstrategies.com
# ────────────────────────────────────────────────────────────

services:
  # ── Internal DNS resolver ──────────────────────────────
  # Resolves .internal hostnames privately; forwards everything else to public DNS.
  # Config: dns/dnsmasq.conf — edit that file to move a service to a new droplet.
  dns:
    image: andyshinn/dnsmasq:2.86
    container_name: volo-dns
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - ./dns/dnsmasq.conf:/etc/dnsmasq.conf:ro
    networks:
      volo-net:
        ipv4_address: 172.20.0.2
    healthcheck:
      test: ["CMD", "nslookup", "volo-db.internal", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: volo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-volo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bound to all interfaces so it remains reachable over the private network
    # when app servers are added. Access is restricted by the DO firewall —
    # only allow port 5432 from trusted private IPs (10.108.0.0/20 or specific droplets).
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      volo-net:
        ipv4_address: 172.20.0.10

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: volo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-voloredis}
    volumes:
      - redis_data:/data
    # Same reasoning as postgres above — DO firewall restricts port 6379.
    ports:
      - "0.0.0.0:6379:6379"
    healthcheck:
      # REDISCLI_AUTH avoids showing the password in process listings (-a flag)
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=${REDIS_PASSWORD:-voloredis} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      volo-net:
        ipv4_address: 172.20.0.11

  # ── API (FastAPI) ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: volo-api
    restart: unless-stopped
    dns:
      - 172.20.0.2  # volo-dns container
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-volo}:${POSTGRES_PASSWORD}@volo-db.internal:5432/${POSTGRES_DB:-volo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-voloredis}@volo-cache.internal:6379
      FRONTEND_URL: https://volo.kingpinstrategies.com
      TWITTER_REDIRECT_URI: https://volo.kingpinstrategies.com/api/auth/twitter/callback
    env_file:
      - .env.prod
    depends_on:
      dns:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - volo-net

  # ── Web (Next.js) ─────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: volo-web
    restart: unless-stopped
    dns:
      - 172.20.0.2  # volo-dns container
    environment:
      NODE_ENV: production
      # API_URL is served to the browser at runtime via /api/config — not baked into the build.
      API_URL: https://volo.kingpinstrategies.com
    depends_on:
      - api
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - volo-net

volumes:
  postgres_data:
  redis_data:

networks:
  volo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
