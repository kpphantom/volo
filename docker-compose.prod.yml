# ── Volo Production Deployment ──────────────────────────────
# docker-compose.prod.yml
#
# Deploy: docker compose -f docker-compose.prod.yml up -d --build
# Domain: volo.kingpinstrategies.com
# ────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: volo-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-volo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - volo-net

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: volo-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-voloredis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-voloredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - volo-net

  # ── API (FastAPI) ──────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    container_name: volo-api
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-volo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-volo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-voloredis}@redis:6379
      FRONTEND_URL: https://volo.kingpinstrategies.com
      TWITTER_REDIRECT_URI: https://volo.kingpinstrategies.com/api/auth/twitter/callback
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - volo-net
    expose:
      - "8000"

  # ── Web (Next.js) ─────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://volo.kingpinstrategies.com
    container_name: volo-web
    restart: always
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - volo-net
    expose:
      - "3000"

  # ── Nginx (Reverse Proxy + SSL) ───────────────
  nginx:
    image: nginx:alpine
    container_name: volo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - volo-net

  # ── Certbot (SSL Certificate Manager) ─────────
  certbot:
    image: certbot/certbot
    container_name: volo-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --quiet; done"

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  volo-net:
    driver: bridge
