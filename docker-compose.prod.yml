# ── Volo Production Deployment ──────────────────────────────
# docker-compose.prod.yml
#
# Uses system nginx as reverse proxy (shared with trading bot)
# Deploy: docker compose -f docker-compose.prod.yml up -d --build
# Domain: volo.kingpinstrategies.com
# ────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: volo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-volo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - volo-net

  # ── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: volo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-voloredis}
    volumes:
      - redis_data:/data
    healthcheck:
      # REDISCLI_AUTH avoids showing the password in process listings (-a flag)
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=${REDIS_PASSWORD:-voloredis} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - volo-net

  # ── API (FastAPI) ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: volo-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-volo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-volo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-voloredis}@redis:6379
      FRONTEND_URL: https://volo.kingpinstrategies.com
      TWITTER_REDIRECT_URI: https://volo.kingpinstrategies.com/api/auth/twitter/callback
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - volo-net

  # ── Web (Next.js) ─────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    container_name: volo-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # API_URL is served to the browser at runtime via /api/config — not baked into the build.
      API_URL: https://volo.kingpinstrategies.com
    depends_on:
      - api
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - volo-net

volumes:
  postgres_data:
  redis_data:

networks:
  volo-net:
    driver: bridge
