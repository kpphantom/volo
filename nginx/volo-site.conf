# ── Volo — System Nginx Site Config ─────────────────────────
# Place at: /etc/nginx/sites-available/volo
# Symlink:  ln -s /etc/nginx/sites-available/volo /etc/nginx/sites-enabled/
#
# Proxies volo.kingpinstrategies.com to Docker containers:
#   - API (FastAPI) on 127.0.0.1:8001
#   - Web (Next.js) on 127.0.0.1:3001
# ────────────────────────────────────────────────────────────

# Rate limiting
limit_req_zone $binary_remote_addr zone=volo_api:10m rate=30r/s;

# HTTP → HTTPS redirect (after SSL is set up by certbot)
server {
    listen 80;
    server_name volo.kingpinstrategies.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        # Before SSL: proxy directly
        # After certbot runs, it will add a redirect here automatically
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        limit_req zone=volo_api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SSE / streaming
    location /api/remote/chat {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
