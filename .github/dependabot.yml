version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Node dependencies
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Docker base images (Dockerfiles + docker-compose)
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
